version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexora_postgres
    environment:
      POSTGRES_DB: nexora_enterprise
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: nexora_password_secure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexora -d nexora_enterprise"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexora_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexora_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexora:nexora_password_secure@postgres:5432/nexora_enterprise
      - REDIS_URL=redis://redis:6379/0
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nexora_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
